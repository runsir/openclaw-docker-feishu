version: '3.8'

services:
  openclaw-feishu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-feishu
    image: runsir/openclaw-feishu:latest
    restart: unless-stopped

    # 环境变量配置 - 自动加载 .env 文件中的所有变量
    env_file:
      - .env

    # 端口映射
    ports:
      - "${SSH_PORT:-2222}:22"
      - "${OPENCLAW_PORT:-18789}:18789"

    # 卷挂载 - 持久化 OpenClaw 配置和数据
    volumes:
      - ${OPENCLAW_DATA_DIR:-./data}:/root/.openclaw
      - ${OPENCLAW_LOG_DIR:-./logs}:/root/.openclaw/logs

    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # 额外配置
    hostname: openclaw-feishu
    privileged: true
    cap_add:
      - NET_ADMIN
